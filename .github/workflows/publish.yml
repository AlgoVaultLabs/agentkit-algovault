name: Publish to npm

# Publishes agentkit-algovault to npm on a version tag (or manual dispatch),
# using the AlgoVaultLabs Automation token. Mirrors the crypto-quant-signal-mcp
# publish flow. Requires the repo (or org) Actions secret `NPM_TOKEN` — an npm
# Automation token with publish rights (it can create new packages, unlike the
# day-to-day token).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
